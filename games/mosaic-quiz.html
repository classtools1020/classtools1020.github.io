<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔍 馬賽克猜猜樂 升級版</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #581c87 50%, #0f172a 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px;
    color: #333;
  }
  h1 { color: white; font-size: 1.9em; text-align: center; margin-bottom: 3px; text-shadow: 2px 2px 6px rgba(0,0,0,0.5); }
  .subtitle { color: rgba(255,255,255,0.8); font-size: 0.95em; margin-bottom: 12px; }

  .screen {
    background: white; border-radius: 24px; padding: 30px;
    max-width: 650px; width: 100%; text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .screen h2 { font-size: 1.7em; margin-bottom: 10px; color: #581c87; }
  .screen p { font-size: 1.1em; margin-bottom: 18px; line-height: 1.8; color: #555; }

  .big-btn {
    color: white; border: none; padding: 15px 40px; font-size: 1.3em;
    border-radius: 50px; cursor: pointer; font-weight: bold; transition: transform 0.2s;
  }
  .big-btn:hover { transform: scale(1.05); }
  .big-btn:active { transform: scale(0.97); }
  .btn-start { background: linear-gradient(135deg, #f59e0b, #ef4444); box-shadow: 0 4px 15px rgba(239,68,68,0.4); }
  .btn-next { background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 4px 15px rgba(16,185,129,0.4); }
  .btn-replay { background: linear-gradient(135deg, #3b82f6, #1d4ed8); box-shadow: 0 4px 15px rgba(59,130,246,0.4); }

  .game-area { display: none; max-width: 650px; width: 100%; }

  .progress-bar { display: flex; justify-content: center; gap: 6px; margin-bottom: 10px; }
  .prog-dot { width: 40px; height: 7px; border-radius: 4px; background: rgba(255,255,255,0.2); transition: background 0.3s; }
  .prog-dot.active { background: #f59e0b; }
  .prog-dot.done { background: #10b981; }

  .game-card {
    background: white; border-radius: 24px; padding: 20px;
    text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .round-label { font-size: 0.9em; color: #8b5cf6; font-weight: bold; }
  .score-label { font-size: 0.9em; color: #f59e0b; font-weight: bold; }
  .game-title { font-size: 1.4em; font-weight: bold; color: #1e1b4b; margin-bottom: 10px; }

  /* 角色提示 */
  .character-hint {
    display: none; background: #fef3c7; border: 2px solid #f59e0b;
    border-radius: 14px; padding: 10px 16px; margin-bottom: 10px;
    font-size: 1.05em; line-height: 1.5;
  }
  .character-hint.show { display: block; }

  /* 馬賽克 */
  .mosaic-container {
    position: relative; width: 100%; max-width: 480px; aspect-ratio: 4/3;
    margin: 0 auto 10px; border-radius: 14px; overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2); background: #1e1b4b;
  }
  .mosaic-image { width: 100%; height: 100%; object-fit: cover; display: block; }

  .mosaic-grid {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(6, 1fr);
  }

  .mosaic-tile {
    background: #581c87; border: 1px solid #4c1d95;
    cursor: pointer; transition: all 0.35s ease;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85em; color: rgba(255,255,255,0.3);
    user-select: none;
  }
  .mosaic-tile:hover:not(.revealed) { background: #7c3aed; border-color: #8b5cf6; }
  .mosaic-tile.revealed { background: transparent; border-color: transparent; cursor: default; color: transparent; }

  /* 驚喜格子 */
  .mosaic-tile.surprise {
    background: transparent; border-color: transparent;
    font-size: 1.8em; color: white;
    animation: surprisePop 0.5s ease;
  }
  @keyframes surprisePop {
    0% { transform: scale(0); } 50% { transform: scale(1.3); } 100% { transform: scale(1); }
  }

  .tiles-info { font-size: 0.88em; color: #6b7280; margin-bottom: 8px; }
  .tiles-info strong { color: #8b5cf6; }

  .reveal-btn-area { margin-bottom: 10px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
  .reveal-btn {
    color: white; border: none; padding: 10px 22px; font-size: 1em;
    border-radius: 50px; cursor: pointer; font-weight: bold; transition: transform 0.2s;
  }
  .reveal-btn:hover { transform: scale(1.05); }
  .r1 { background: linear-gradient(135deg, #8b5cf6, #6d28d9); }
  .r3 { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
  .rall { background: linear-gradient(135deg, #ef4444, #dc2626); font-size: 0.9em; }

  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .opt-btn {
    background: #f3f4f6; border: 3px solid #e5e7eb; border-radius: 14px;
    padding: 13px; font-size: 1.2em; font-weight: bold;
    cursor: pointer; transition: all 0.2s; color: #374151;
  }
  .opt-btn:hover { background: #ede9fe; border-color: #8b5cf6; transform: scale(1.03); }
  .opt-btn.correct { background: #d1fae5; border-color: #10b981; color: #065f46; animation: pop 0.4s ease; }
  .opt-btn.wrong { background: #fee2e2; border-color: #ef4444; color: #991b1b; animation: shake 0.35s ease; }
  .opt-btn:disabled { cursor: default; opacity: 0.7; }
  @keyframes pop { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

  .fb { display: none; padding: 12px; border-radius: 14px; font-size: 1.15em; font-weight: bold; margin-bottom: 10px; }
  .fb.show { display: block; }
  .fb-correct { background: #d1fae5; color: #065f46; border: 2px solid #10b981; }
  .fb-wrong { background: #fef3c7; color: #92400e; border: 2px solid #f59e0b; }

  .explain {
    display: none; background: #eff6ff; border: 2px solid #3b82f6;
    border-radius: 14px; padding: 14px; text-align: left;
    font-size: 0.95em; line-height: 1.7; margin-bottom: 10px; color: #1e40af;
  }
  .explain.show { display: block; }

  .next-btn-area { display: none; }
  .next-btn-area.show { display: block; }

  #resultScreen { display: none; }
  .result-score { font-size: 3.2em; font-weight: bold; color: #f59e0b; margin: 12px 0; }
  .result-detail { font-size: 1.1em; color: #555; margin-bottom: 8px; }
  .result-msg {
    font-size: 1.05em; padding: 14px; background: #fef3c7;
    border-radius: 12px; margin: 12px 0; color: #92400e; line-height: 1.7; white-space: pre-line;
  }

  @media (max-width: 500px) {
    h1 { font-size: 1.4em; }
    .game-card { padding: 14px; }
    .mosaic-tile { font-size: 0.7em; }
    .opt-btn { font-size: 1em; padding: 11px; }
    .game-title { font-size: 1.15em; }
    .reveal-btn { padding: 8px 16px; font-size: 0.9em; }
  }
</style>
</head>
<body>

<h1>🔍 馬賽克猜猜樂 升級版</h1>
<p class="subtitle">揭開馬賽克，猜猜是什麼！越早猜對分數越高！</p>

<div class="screen" id="startScreen">
  <h2>🎮 準備好了嗎？</h2>
  <p>
    照片被 48 格馬賽克遮住了！<br><br>
    🟪 點格子或按按鈕揭開<br>
    💭 覺得知道就趕快猜<br>
    ⭐ 揭越少格，分數越高！<br>
    🎁 有些格子藏著驚喜喔～
  </p>
  <button class="big-btn btn-start" onclick="startGame()">🚀 開始挑戰！</button>
</div>

<div class="game-area" id="gameArea">
  <div class="progress-bar" id="progressBar"></div>
  <div class="game-card">
    <div class="card-top">
      <span class="round-label" id="roundLabel"></span>
      <span class="score-label" id="scoreLabel"></span>
    </div>
    <div class="game-title" id="gameTitle"></div>
    <div class="character-hint" id="charHint"></div>

    <div class="mosaic-container">
      <img class="mosaic-image" id="mosaicImage" src="" alt="">
      <div class="mosaic-grid" id="mosaicGrid"></div>
    </div>

    <div class="tiles-info" id="tilesInfo"></div>

    <div class="reveal-btn-area" id="revealBtnArea">
      <button class="reveal-btn r1" onclick="revealN(1)">🔍 開1格</button>
      <button class="reveal-btn r3" onclick="revealN(3)">🔍🔍🔍 開3格</button>
      <button class="reveal-btn rall" onclick="revealAll()">😱 全部打開</button>
    </div>

    <div id="guessArea">
      <div class="options-grid" id="optionsGrid"></div>
    </div>

    <div class="fb" id="feedback"></div>
    <div class="explain" id="explanation"></div>
    <div class="next-btn-area" id="nextBtnArea">
      <button class="big-btn btn-next" id="nextBtn" onclick="nextRound()">下一題 ➡️</button>
    </div>
  </div>
</div>

<div class="screen" id="resultScreen">
  <h2>🏆 挑戰結束！</h2>
  <div class="result-score" id="resultScore"></div>
  <div class="result-detail" id="resultDetail"></div>
  <div class="result-msg" id="resultMsg"></div>
  <button class="big-btn btn-replay" onclick="resetGame()">🔄 再玩一次</button>
</div>

<script>
const COLS = 8, ROWS = 6, TOTAL = COLS * ROWS; // 48格

// 驚喜格子的 emoji
const SURPRISES = ['🍄','⭐','💎','🎵','❤️','🌈','🐱','🎁','🍀','👻','🦄','🎪'];

// 搞笑角色台詞
const funnyLines = {
  doraemon: ['哆啦A夢：「這個不是銅鑼燒啦！」','哆啦A夢：「百寶袋裡沒有這個喔～」','哆啦A夢：「大雄你看清楚一點！」'],
  luffy: ['魯夫：「是肉嗎？！是肉嗎？！」','魯夫：「不管是什麼我都要吃！」','魯夫：「海賊王的眼睛是雪亮的！」'],
  shinchan: ['小新：「這個看起來好好吃喔～屁股～」','小新：「美冴媽媽有煮過這個！」','小新：「動感超人也會吃這個嗎？」'],
  pikachu: ['皮卡丘：「皮卡皮卡！⚡」','皮卡丘：「這不是寶可夢飼料吧？」','皮卡丘：「十萬伏特也猜不到！」'],
  mario: ['瑪利歐：「這不是蘑菇！Yahoo！」','瑪利歐：「闖關成功就能吃到！」','瑪利歐：「比庫巴城堡裡的食物好！」']
};

const rounds = [
  {
    image: "https://upload.wikimedia.org/wikipedia/commons/3/37/Foxtail_millet.jpg",
    title: "🔍 這是什麼食物？",
    character: "doraemon",
    charHintText: "🤖 哆啦A夢：「大雄～這個東西小小顆的，原住民超愛吃！」",
    options: ["稻米", "小米", "玉米粒", "芝麻"],
    correct: 1,
    explain: "🌾 答案是小米！\n\n原住民住在山上，山上是斜坡，不適合種稻米（稻米需要平地和很多水）。\n小米在斜坡也能種，而且不用很多水！\n所以小米是原住民最重要的主食！\n\n哆啦A夢：「就算有百寶袋，也變不出比小米更適合山上的食物！」"
  },
  {
    image: "https://upload.wikimedia.org/wikipedia/commons/5/58/Ipomoea_batatas_006.JPG",
    title: "🔍 這又是什麼食物？",
    character: "shinchan",
    charHintText: "🖍️ 小新：「這個東西我超愛吃的耶～烤起來香香甜甜的～」",
    options: ["芋頭", "馬鈴薯", "紅蘿蔔", "地瓜"],
    correct: 3,
    explain: "🍠 答案是地瓜！\n\n小新最愛的烤地瓜！原住民6000年前就在種了！\n✅ 超好種，不用太多照顧\n✅ 產量超高，一個藤長很多\n✅ 可以保存很久，不會馬上壞\n\n小新：「原來我跟原住民的品味一樣耶～屁股屁股～」"
  },
  {
    image: "https://upload.wikimedia.org/wikipedia/commons/5/55/Dried_meat.jpg",
    title: "🔍 這個比較難喔！",
    character: "pikachu",
    charHintText: "⚡ 皮卡丘：「皮卡！這個東西可以補充體力，就像傷藥一樣！」",
    options: ["培根", "肉乾", "牛排", "生魚片"],
    correct: 1,
    explain: "🥩 答案是肉乾！\n\n6000年前沒有冰箱！新鮮肉在30度只能撐1天就壞掉了！\n原住民把肉曬乾☀️、煙燻🔥、醃製🧂\n→ 可以保存好幾個月！\n\n皮卡丘：「就像寶可夢的傷藥，隨時可以補血！皮卡！⚡」"
  },
  {
    image: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e1/Bamboo_book_-_binding_-_UCR.jpg/1280px-Bamboo_book_-_binding_-_UCR.jpg",
    title: "🎁 驚喜題！這是什麼材料？",
    character: "mario",
    charHintText: "🍄 瑪利歐：「這不是水管！但原住民很愛用它！」",
    options: ["塑膠", "鐵", "竹子", "玻璃"],
    correct: 2,
    explain: "🎋 答案是竹子！\n\n原住民用竹子做很多東西：\n🥢 竹筷、🥣 竹碗、🧺 竹籃、🎍 竹筒飯\n\n6000年前沒有塑膠，也沒有不鏽鋼！\n竹子是天然的、環保的、而且山上到處都有！\n\n瑪利歐：「比水管還好用！Yahoo！」"
  },
  {
    image: "https://upload.wikimedia.org/wikipedia/commons/thumb/9/92/Paiwan_dancer.jpg/800px-Paiwan_dancer.jpg",
    title: "🎁 最後一題！猜猜看！",
    character: "luffy",
    charHintText: "🏴‍☠️ 魯夫：「這些人看起來超強的！他們是誰？」",
    options: ["日本忍者", "台灣原住民", "美國牛仔", "中國武術家"],
    correct: 1,
    explain: "🎉 答案是台灣原住民！\n\n台灣原住民在6000年前就住在台灣了！\n他們住在山上🏔️，靠著智慧在大自然中生活：\n🌾 種小米、🍠 種地瓜、🥩 做肉乾、🎋 用竹子\n\n魯夫：「他們是真正的生存王！比海賊還厲害！我要跟他們當朋友！」"
  }
];

let currentRound = 0, totalScore = 0, tilesRevealed = 0, answered = false;
let tileOrder = [], surpriseTiles = new Set();

function startGame() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('gameArea').style.display = 'block';
  document.getElementById('resultScreen').style.display = 'none';
  currentRound = 0; totalScore = 0;
  loadRound();
}

function loadRound() {
  const r = rounds[currentRound];
  answered = false; tilesRevealed = 0;

  // 進度
  const bar = document.getElementById('progressBar');
  bar.innerHTML = '';
  rounds.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'prog-dot' + (i === currentRound ? ' active' : '') + (i < currentRound ? ' done' : '');
    bar.appendChild(d);
  });

  document.getElementById('roundLabel').textContent = `第 ${currentRound + 1} 題 / ${rounds.length}`;
  document.getElementById('scoreLabel').textContent = `⭐ ${totalScore} 分`;
  document.getElementById('gameTitle').textContent = r.title;

  // 角色提示（揭開8格後出現）
  const charHint = document.getElementById('charHint');
  charHint.textContent = r.charHintText;
  charHint.className = 'character-hint';

  // 圖片
  document.getElementById('mosaicImage').src = r.image;

  // 馬賽克格子
  const grid = document.getElementById('mosaicGrid');
  grid.innerHTML = '';
  tileOrder = shuffleArray([...Array(TOTAL).keys()]);

  // 隨機選5格當驚喜格
  surpriseTiles = new Set();
  const shuffled = shuffleArray([...Array(TOTAL).keys()]);
  for (let i = 0; i < 5; i++) surpriseTiles.add(shuffled[i]);

  for (let i = 0; i < TOTAL; i++) {
    const tile = document.createElement('div');
    tile.className = 'mosaic-tile';
    tile.textContent = '？';
    tile.dataset.index = i;
    tile.onclick = () => revealTile(i);
    grid.appendChild(tile);
  }

  updateInfo();

  // 選項
  const optGrid = document.getElementById('optionsGrid');
  optGrid.innerHTML = '';
  r.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.onclick = () => guess(i);
    optGrid.appendChild(btn);
  });

  document.getElementById('revealBtnArea').style.display = 'flex';
  document.getElementById('guessArea').style.display = 'block';
  document.getElementById('feedback').className = 'fb';
  document.getElementById('explanation').className = 'explain';
  document.getElementById('nextBtnArea').className = 'next-btn-area';
}

function shuffleArray(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function revealTile(index) {
  if (answered) return;
  const tiles = document.querySelectorAll('.mosaic-tile');
  if (tiles[index].classList.contains('revealed') || tiles[index].classList.contains('surprise')) return;

  if (surpriseTiles.has(index)) {
    // 驚喜格！
    const emoji = SURPRISES[Math.floor(Math.random() * SURPRISES.length)];
    tiles[index].classList.add('surprise');
    tiles[index].textContent = emoji;
    // 不算揭開（不影響分數，純搞笑）
  } else {
    tiles[index].classList.add('revealed');
    tiles[index].textContent = '';
    tilesRevealed++;
  }

  // 揭開8格後顯示角色提示
  if (tilesRevealed >= 8) {
    document.getElementById('charHint').className = 'character-hint show';
  }

  // 揭開15格後顯示搞笑台詞
  if (tilesRevealed === 15) {
    const r = rounds[currentRound];
    const lines = funnyLines[r.character];
    if (lines) {
      const charHint = document.getElementById('charHint');
      charHint.textContent = lines[Math.floor(Math.random() * lines.length)];
    }
  }

  updateInfo();
}

function revealN(n) {
  if (answered) return;
  const tiles = document.querySelectorAll('.mosaic-tile');
  let count = 0;
  for (const idx of tileOrder) {
    if (count >= n) break;
    if (!tiles[idx].classList.contains('revealed') && !tiles[idx].classList.contains('surprise')) {
      revealTile(idx);
      count++;
    }
  }
}

function revealAll() {
  if (answered) return;
  const tiles = document.querySelectorAll('.mosaic-tile');
  let delay = 0;
  for (const idx of tileOrder) {
    if (!tiles[idx].classList.contains('revealed') && !tiles[idx].classList.contains('surprise')) {
      setTimeout(() => {
        tiles[idx].classList.add('revealed');
        tiles[idx].textContent = '';
      }, delay);
      delay += 25;
    }
  }
  tilesRevealed = TOTAL;
  updateInfo();
}

function updateInfo() {
  const pts = calcPoints();
  document.getElementById('tilesInfo').innerHTML =
    `已揭開 <strong>${tilesRevealed}</strong> / ${TOTAL} 格 ｜ 現在猜對 → <strong>⭐${pts} 分</strong>`;
}

function calcPoints() {
  if (tilesRevealed <= 6) return 10;
  if (tilesRevealed <= 12) return 8;
  if (tilesRevealed <= 18) return 6;
  if (tilesRevealed <= 24) return 5;
  if (tilesRevealed <= 30) return 4;
  if (tilesRevealed <= 36) return 3;
  if (tilesRevealed <= 42) return 2;
  return 1;
}

function guess(index) {
  if (answered) return;
  answered = true;

  const r = rounds[currentRound];
  const btns = document.querySelectorAll('.opt-btn');
  const fb = document.getElementById('feedback');
  btns.forEach(b => b.disabled = true);

  // 揭開全部
  const tiles = document.querySelectorAll('.mosaic-tile');
  tiles.forEach((tile, i) => {
    setTimeout(() => {
      tile.classList.add('revealed');
      tile.textContent = '';
    }, i * 20);
  });

  if (index === r.correct) {
    const pts = calcPoints();
    totalScore += pts;
    btns[index].classList.add('correct');
    fb.className = 'fb fb-correct show';
    let bonus = '';
    if (pts >= 8) bonus = ' 🔥 超強！幾乎沒看就猜到！';
    else if (pts >= 5) bonus = ' 👏 很厲害！';
    fb.innerHTML = `🎉 答對了！+${pts} 分！${bonus}`;
  } else {
    btns[index].classList.add('wrong');
    btns[r.correct].classList.add('correct');
    fb.className = 'fb fb-wrong show';
    const lines = funnyLines[r.character];
    const funnyLine = lines ? '\n' + lines[Math.floor(Math.random() * lines.length)] : '';
    fb.innerHTML = `💪 沒關係！答案是「${r.options[r.correct]}」！${funnyLine}`;
  }

  document.getElementById('scoreLabel').textContent = `⭐ ${totalScore} 分`;
  document.getElementById('revealBtnArea').style.display = 'none';

  const explain = document.getElementById('explanation');
  explain.innerHTML = r.explain.replace(/\n/g, '<br>');
  explain.className = 'explain show';

  const nextArea = document.getElementById('nextBtnArea');
  nextArea.className = 'next-btn-area show';
  document.getElementById('nextBtn').textContent =
    currentRound < rounds.length - 1 ? '下一題 ➡️' : '看結果 🏆';
}

function nextRound() {
  currentRound++;
  if (currentRound < rounds.length) loadRound();
  else showResult();
}

function showResult() {
  document.getElementById('gameArea').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'block';

  const maxScore = rounds.length * 10;
  document.getElementById('resultScore').textContent = `${totalScore} / ${maxScore}`;
  document.getElementById('resultDetail').textContent = `${rounds.length} 題挑戰完成！`;

  let msg = '';
  if (totalScore >= 40) {
    msg = '🌟 食物偵探大師！！\n你的觀察力超強，看一點點就猜到了！\n原住民如果看到你一定會說：\n「這個小孩很厲害！」';
  } else if (totalScore >= 25) {
    msg = '🔥 很厲害！你是食物小達人！\n大部分都猜對了！\n今天上課會學到更多原住民的智慧喔！';
  } else if (totalScore >= 15) {
    msg = '👍 不錯喔！認識了好幾種食物！\n魯夫說：「繼續努力，\n總有一天你會成為食物王！」';
  } else {
    msg = '🤗 沒關係！這些食物本來就不容易猜！\n小新說：「我第一次看到也不認識啊～」\n今天上課會全部教你！準備好了嗎？';
  }
  document.getElementById('resultMsg').textContent = msg;
}

function resetGame() { startGame(); }
</script>
