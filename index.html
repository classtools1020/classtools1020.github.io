<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特教互動教材</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 {
            font-size: 2em;
            margin-bottom: 10px;
            color: #333;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .game-list {
            list-style: none;
        }
        .game-list li {
            margin: 15px 0;
        }
        .game-list a {
            display: block;
            padding: 20px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            text-decoration: none;
            border-radius: 15px;
            font-size: 1.3em;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .game-list a:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(245, 87, 108, 0.4);
        }
        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 特教互動教材</h1>
        <p class="subtitle">芎林國中 特教班專用</p>
        <ul class="game-list">
            <li><a href="games/mosaic-quiz.html">🧩 馬賽克猜猜樂 - 原住民飲食文化</a></li>
        </ul>
        <p class="footer">曾瓊瑩老師 製作</p>
    </div>
</body>
</html>
